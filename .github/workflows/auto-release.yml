name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/package.json'
      - '.github/workflows/auto-release.yml'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # GH_PAT must be a Personal Access Token with 'contents: write' scope.
      # It is required so that the tag push triggers downstream workflows
      # (GITHUB_TOKEN-created tags do not trigger other workflows).
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' apps/server/package.json | head -1)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse v${{ steps.version.outputs.version }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh release create v${{ steps.version.outputs.version }} \
            --title "Release v${{ steps.version.outputs.version }}" \
            --notes "## Release v${{ steps.version.outputs.version }}

          Docker image: \`ghcr.io/jimski427/tracearr:v${{ steps.version.outputs.version }}\`" \
            --latest
