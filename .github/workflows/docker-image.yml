name: Publish Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from git tags
        id: version
        run: |
          git fetch --tags
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Standard build metadata
      - name: Extract metadata (standard)
        id: meta-standard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # Supervised build metadata
      - name: Extract metadata (supervised)
        id: meta-supervised
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-supervised
            type=semver,pattern={{version}}-supervised
            type=raw,value=supervised

      # Build standard image
      - name: Build and push Docker image (standard)
        id: push-standard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-standard.outputs.tags }}
          labels: ${{ steps.meta-standard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            APP_TAG=${{ steps.version.outputs.version }}
            APP_COMMIT=${{ github.sha }}
            APP_BUILD_DATE=${{ github.event.workflow_run.head_commit.timestamp }}

      # Build supervised image
      - name: Build and push Docker image (supervised)
        id: push-supervised
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.supervised
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-supervised.outputs.tags }}
          labels: ${{ steps.meta-supervised.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            APP_TAG=supervised-${{ steps.version.outputs.version }}
            APP_COMMIT=${{ github.sha }}
            APP_BUILD_DATE=${{ github.event.workflow_run.head_commit.timestamp }}

      - name: Generate artifact attestation (standard)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push-standard.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation (supervised)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push-supervised.outputs.digest }}
          push-to-registry: true
